  <script>
    
    const inputElement = document.querySelector('input');
    if (inputElement) {
      inputElement.addEventListener('focus', function() {
        // 取消網頁的滾動行為
        document.documentElement.style.overflow = 'hidden';
      });
    }
    
    function closeBrowser() {
      window.webkit.messageHandlers.CloseIndependentView.postMessage('');
    }

    function share() {
      const data = [
        {"info": "文字範例之今天天氣晴", "type": "T", "ext": ""},
        {"info": "https://pl.family.com.tw/PictureLibrary/00002/09/0540609_001.JPG", "type": "P", "ext": "jpg"},
        {"info": "https://img3.momoshop.com.tw/goodsimg/0007/476/986/spec/7476986_01_009_R.jpg", "type": "P", "ext": "jpg"}
      ];
      // 將 data 轉換為 JSON 字串
      const jsonData = JSON.stringify(data);

      if (window.android && window.android.JsToJavaInterface) {
          window.android.ShareWebInfo('1', jsonData);
      } else if (window.webkit) {
          window.webkit.messageHandlers.ShareWebInfo.postMessage(['1', jsonData])
      } else {
          alert('網頁(Web)不支援此功能。')
      }
    }
    
    function download() {
      const data = [
        "https://www.books.com.tw/img/001/100/67/0011006776.jpg",
        "https://www.books.com.tw/img/001/100/67/0011006777.jpg",
        "https://www.books.com.tw/img/001/100/67/0011006778.jpg",
        "https://www.books.com.tw/img/001/100/67/0011006779.jpg",
        "https://www.books.com.tw/img/001/100/67/0011006780.jpg",
        "https://www.books.com.tw/img/001/100/67/0011006781.jpg",
        "https://www.books.com.tw/img/001/100/67/0011006782.jpg",
        "https://www.books.com.tw/img/001/100/67/0011006783.jpg",
        "https://www.books.com.tw/img/001/100/67/0011006784.jpg",
        "https://www.books.com.tw/img/001/100/67/0011006785.jpg",
        "https://www.books.com.tw/img/001/100/67/0011006786.jpg",
        "https://www.books.com.tw/img/001/082/25/0010822522.jpg",
      ];
      // 將 data 轉換為 JSON 字串
      const jsonData = JSON.stringify(data);
      
      if (window.android && window.android.JsToJavaInterface) {
          window.android.DownloadImages(jsonData);
      } else if (window.webkit) {
          window.webkit.messageHandlers.DownloadImages.postMessage([jsonData])
      } else {
          alert('網頁(Web)不支援此功能。')
      }
    }

    function downloadMp4() {
      const data = [
        "https://stream7.iqilu.com/10339/upload_transcode/202002/09/20200209105011F0zPoYzHry.mp4",
        "https://stream7.iqilu.com/10339/upload_transcode/202002/09/20200209104902N3v5Vpxuvb.mp4",
      ];
      // 將 data 轉換為 JSON 字串
      const jsonData = JSON.stringify(data);
      
      if (window.android && window.android.JsToJavaInterface) {
          window.android.DownloadMp4(jsonData);
      } else if (window.webkit) {
          window.webkit.messageHandlers.DownloadMp4.postMessage([jsonData])
      } else {
          alert('網頁(Web)不支援此功能。')
      }
    }

    

    function storeData(type) {

      var storeDataPayload = ['WEB.0.0', 'Input', '測試用網頁', '20261225'];
      switch(type) {
        case 1:
          storeDataPayload = ['VISIBLE.1.1', 'pic', '{VisibleScreen}', '20260420'];
          break;
        case 2:
          storeDataPayload = ['FULL.2.2', 'pic', '{FullScreen}', '20260510'];
          break;
        default:
          break;
      }

      if (window.android && window.android.JsToJavaInterface) {
          window.android.storeData(...storeDataPayload);
      } else if (window.webkit) {
          window.webkit.messageHandlers.storeData.postMessage(storeDataPayload)
      } else {
          alert('網頁(Web)不支援此功能。')
      }
    }

    function requestData(type) {
      var requestDataPayload = [
        {"funcCode": "WEB.0.0", "key": "Input"}
      ];
      switch(type) {
        case 1:
          requestDataPayload = [
            {"funcCode": "VISIBLE.1.1", "key": "pic"}
          ];
          break;
        case 2:
          requestDataPayload = [
            {"funcCode": "FULL.2.2", "key": "pic"}
          ];
          break;
        default:
          break;
      }

      // 將 data 轉換為 JSON 字串
      const jsonData = JSON.stringify(requestDataPayload);

      if (window.android && window.android.JsToJavaInterface) {
          window.android.requestData(jsonData);
      } else if (window.webkit) {
          window.webkit.messageHandlers.requestData.postMessage([jsonData])
      } else {
          alert('網頁(Web)不支援此功能。')
      }
    }

    function removeData(type) {
      var removeDataPayload = [{"funcCode": "WEB.0.0", "key": "Input"}];
      switch(type) {
        case 1:
          removeDataPayload = [{"funcCode": "VISIBLE.1.1", "key": "pic"}];
          break;
        case 2:
          removeDataPayload = [{"funcCode": "FULL.2.2", "key": "pic"}];
          break;
        default:
          break;
      }

      // 將 data 轉換為 JSON 字串
      const jsonData = JSON.stringify(removeDataPayload);

      if (window.android && window.android.JsToJavaInterface) {
          window.android.removeData(jsonData);
      } else if (window.webkit) {
          window.webkit.messageHandlers.removeData.postMessage([jsonData])
      } else {
          alert('網頁(Web)不支援此功能。')
      }
    }
    
    // window.webkit.messageHandlers.getFont.postMessage('');
    
    window.appWebAssociate = {
      loadCustomFont: function(fontBase64) {
        var fontData = atob(fontBase64);
        var fontArray = new Uint8Array(fontData.length);
        for (var i = 0; i < fontData.length; i++) {
          fontArray[i] = fontData.charCodeAt(i);
        }
        var fontBlob = new Blob([fontArray], {type: 'font/otf'});
        var fontURL = URL.createObjectURL(fontBlob);
        var fontFace = new FontFace('MyFont', 'url(' + fontURL + ')');
        fontFace.load().then(function() {
          document.fonts.add(fontFace);
          window.appWebAssociate.onCustomFontLoaded('MyFont');
        });
      },
      onCustomFontLoaded: function(fontName) {
            document.body.style.fontFamily = fontName;
        }
    };
</script>
