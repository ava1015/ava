<html><head>
    
</head>
<body>
    UI<br><br><br>
    <p>語音辨識</p>
    <button id="OpenStt" style="margin:10px;font-size:50px">打開語音辨識</button><br>
    <button id="CloseStt" style="margin:10px;font-size:50px">關閉語音辨識</button><br><br>
    <p>拍照或選取照片</p>
    <button id="OpenCamera" style="margin:10px;font-size:50px">打開相機</button><br>
    <button id="OpenSelect" style="margin:10px;font-size:50px">相片選擇</button><br>
    <button id="CloseCamera" style="margin:10px;font-size:50px">關閉相機</button><br><br>
    <p>掃描器</p>
    <button id="OpenScanner" style="margin:10px;font-size:50px">打開掃描器</button><br><br>
    <button id="CloseScanner" style="margin:10px;font-size:50px">關閉掃描器</button><br><br>
    <div id="GetData"></div>

<script>
    var OpenCamera = document.getElementById('OpenCamera');
    var OpenSelect = document.getElementById('OpenSelect');
    var CloseCamera = document.getElementById('CloseCamera');
    var GetData = document.getElementById('GetData');

    var OpenScanner = document.getElementById('OpenScanner');
    var CloseScanner = document.getElementById('CloseScanner');

    var OpenStt = document.getElementById('OpenStt');
    var CloseStt = document.getElementById('CloseStt');

    OpenCamera.onclick = function () {
        alert("OpenCamera")

        try {
            if (window.android && window.android.JsToJavaInterface) {
                window.android.stdPhotoOn('Y', '5');
            } else if (window.webkit) {
                // call ios
                GetData.innerHTML += "<br>" + "<br>" + 'stdPhotoOn';
                window.webkit.messageHandlers.stdPhotoOn.postMessage(['Y', '5'])
            }
        } catch (e) {
            alert("錯誤:" + e);
        }

    };

    OpenSelect.onclick = function () {
        alert("OpenSelect")
        try {
            if (window.android && window.android.JsToJavaInterface) {
                window.android.stdPhotoOn('N', '5');
            } else if (window.webkit) {
                // call ios
                GetData.innerHTML += "<br>" + "<br>" + 'stdPhotoOn';
                window.webkit.messageHandlers.stdPhotoOn.postMessage(['N', '5'])
            }
        } catch (e) {
            alert("錯誤" + e);
        }

    };

    CloseCamera.onclick = function () {
        alert("CloseCamera")
        stdPhotoClosed(1)
    };

    OpenScanner.onclick = function () {
        alert("OpenScanner")
        try {
            if (window.android && window.android.JsToJavaInterface) {
                window.android.stdScannerOn('掃描一維條碼', '');
            } else if (window.webkit) {
                // call ios
                GetData.innerHTML += "<br>" + "<br>" + 'stdScannerOn';
                window.webkit.messageHandlers.stdScannerOn.postMessage(['掃描一維條碼', ''])
            }
        } catch (e) {
            alert("錯誤" + e);
        }

    };

    CloseScanner.onclick = function () {
        alert("CloseScanner")
        stdScannerClosed(1)
    };

    OpenStt.onclick = function () {
        alert("OpenStt")
        try {
            if (window.android && window.android.JsToJavaInterface) {
                window.android.stdSttOn();
            } else if (window.webkit) {
                // call ios
                GetData.innerHTML += "<br>" + "<br>" + 'stdSttOn';
                window.webkit.messageHandlers.stdSttOn.postMessage()
            }
        } catch (e) {
            alert("錯誤" + e);
        }

    };

    CloseStt.onclick = function () {
        alert("CloseStt")
        stdSttClosed(1)
    };

    //////////////////////////////////////////////

    function stdPhotoUploaded(result) {
        alert("收到掃描結果:"+result);
        result = result.replace(/\\/g, "");
        try {
            GetData.innerHTML = "<br>" + "<br>" + "照片上傳完成結果:" + result;
            if (window.android && window.android.JsToJavaInterface) {
                window.android.stdPhotoOff();
            } else if (window.webkit) {
                // call ios
                GetData.innerHTML += "<br>" + "<br>" + 'stdPhotoOff';
                window.webkit.messageHandlers.stdPhotoOff.postMessage('')
            }
        } catch (e) {
            alert("失敗:" + e);
        }
    }

    function stdPhotoClosed(byUser) {
        GetData.innerHTML += "<br>" + "<br>" + '關閉結果:' + byUser;
    }

    function stdScanned(result) {
        alert("收到掃描結果:"+result);
        try {
            GetData.innerHTML = "<br>" + "<br>" + "掃描結果:" + result;
            if (window.android && window.android.JsToJavaInterface) {
                window.android.stdScannerOff();
            } else if (window.webkit) {
                // call ios
                GetData.innerHTML += "<br>" + "<br>" + 'stdScannerOff';
                window.webkit.messageHandlers.stdScannerOff.postMessage('')
            }
        } catch (e) {
            alert("失敗:" + e);
        }
    }

    function stdScannerClosed(byUser) {
        GetData.innerHTML += "<br>" + "<br>" + '掃描器關閉結果:' + byUser;
    }

    function stdSttResult(result) {
        alert("收到掃描結果:"+result);
        try {
            GetData.innerHTML = "<br>" + "<br>" + "掃描結果:" + result;
            if (window.android && window.android.JsToJavaInterface) {
                window.android.stdSttOff();
            } else if (window.webkit) {
                // call ios
                GetData.innerHTML += "<br>" + "<br>" + 'stdScannerOff';
                window.webkit.messageHandlers.stdSttOff.postMessage('')
            }
        } catch (e) {
            alert("失敗:" + e);
        }
    }

    function stdSttClosed(byUser) {
        GetData.innerHTML += "<br>" + "<br>" + '語音辨識關閉結果:' + byUser;
    }
    
</script></body></html>
